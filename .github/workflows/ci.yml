name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ cppcheck clang-format

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: cd build && ctest -R unit_tests --output-on-failure

      - name: Run integration tests
        run: cd build && ctest -R integration_tests --output-on-failure
      
      - name: Static analysis (cppcheck)
        run: |
          cppcheck --enable=all \
                   --suppress=missingIncludeSystem \
                   --suppress=unusedFunction \
                   --error-exitcode=1 \
                   --std=c++17 \
                   -I src/ \
                   src/

      - name: Check formatting (clang-format)
        run: |
          find src tests \( -name "*.cpp" -o -name "*.hpp" \) -print0 | xargs -0 clang-format --dry-run --Werror
